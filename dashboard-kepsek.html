<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <!-- Menyertakan style global dari project Apps Script Anda -->
  <?!= include('Style'); ?>
  
  <style>
    :root {
      --primary: #0f5132;
      --accent: #e5a93b;
      --bg: #f4f7f5;
      --text-main: #1e293b;
      --white: #ffffff;
      --danger: #dc3545;
      --success: #198754;
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text-main); 
      padding: 20px; 
    }
    
    .container { max-width: 900px; margin: 0 auto; }
    
    .header { 
      background: var(--primary); 
      color: white; 
      padding: 24px; 
      border-radius: 16px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px; 
      border-bottom: 4px solid var(--accent); 
    }
    
    .grid-stats { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 16px; 
      margin-bottom: 24px; 
    }
    
    .card-stat { 
      background: var(--white); 
      padding: 24px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.02); 
      border-left: 4px solid var(--primary); 
    }
    
    .card-stat.alert-card { border-left-color: var(--danger); }
    .card-stat.success-card { border-left-color: var(--success); }
    
    .card-stat h3 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-stat p { font-size: 32px; font-weight: 700; color: var(--primary); margin-top: 8px; }
    .card-stat .detail-text { font-size: 12px; color: #64748b; margin-top: 4px; }
    
    .action-panel {
      background: var(--white);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      text-align: center;
    }
    
    .btn-nav { 
      background: var(--primary); 
      color: white; 
      text-decoration: none; 
      padding: 12px 24px; 
      border-radius: 8px; 
      font-size: 15px; 
      font-weight: 600; 
      display: inline-block; 
      transition: background 0.2s;
    }
    
    .btn-nav:hover { background: #0b3d26; }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Topbar Header Dashboard -->
    <div class="header">
      <div>
        <h1>Dashboard Kepala Sekolah</h1>
        <!-- Mengambil nama user secara dinamis dari Apps Script server-side -->
        <p>Selamat Datang, <strong><?= user.nama ?></strong></p> 
      </div>
    </div>

    <!-- Navigasi Utama Otomatis Internal -->
    <?!= navHtml ?>
    <br>

    <!-- 4 Blok Rangkuman Utama Presensi Hari Ini -->
    <div class="grid-stats">
      <!-- 1. Ringkasan Guru Hadir -->
      <div class="card-stat success-card">
        <h3>Guru Hadir</h3>
        <p id="guruHadir">-</p>
        <div class="detail-text">Sudah melakukan absensi masuk</div>
      </div>
      
      <!-- 2. Ringkasan Guru Tidak Hadir -->
      <div class="card-stat alert-card">
        <h3>Guru Absen/Alfa</h3>
        <p id="guruAbsen" style="color: var(--danger);">-</p>
        <div class="detail-text" id="detailGuruTidakHadir">Memuat data keterangan...</div>
      </div>
      
      <!-- 3. Ringkasan Siswa Hadir -->
      <div class="card-stat success-card">
        <h3>Siswa Hadir</h3>
        <p id="siswaHadir">-</p>
        <div class="detail-text">Total dari seluruh kelas</div>
      </div>
      
      <!-- 4. Ringkasan Siswa Tidak Hadir -->
      <div class="card-stat alert-card">
        <h3>Siswa Absen/Alfa</h3>
        <p id="siswaAbsen" style="color: var(--danger);">-</p>
        <div class="detail-text" id="detailSiswaTidakHadir">Memuat data keterangan...</div>
      </div>
    </div>

    <!-- Panel Menu Rekapan Menuju GitHub Pages (Tab yang Sama) -->
    <div class="action-panel">
      <!-- target="_top" memaksa window utama keluar dari iFrame dan pindah ke link tujuan -->
      <a href="https://binailmublora.github.io/absensi/dashboard-export.html" target="_top" class="btn-nav">📊 Buka Menu Rekapan & Export</a>
    </div>

  </div>

  <script>
    // Token dilempar langsung lewat backend doGet() di code.gs
    const TOKEN = "<?= token ?>";

    function ambilDataKepsek() {
      // Memanggil fungsi server Apps Script secara asinkron tanpa fetch eksternal
      google.script.run
        .withSuccessHandler(function(data) {
          if(data) {
            // Pasang angka statistik utama
            document.getElementById('guruHadir').textContent = data.stats.guruHadir;
            document.getElementById('guruAbsen').textContent = data.stats.guruAbsen;
            document.getElementById('siswaHadir').textContent = data.stats.siswaHadir;
            document.getElementById('siswaAbsen').textContent = data.stats.siswaAbsen;
            
            // Tampilkan detail keterangan alasan tidak hadir jika ada
            document.getElementById('detailGuruTidakHadir').innerHTML = data.details.guruKeterangan || "Semua staf terabsen.";
            document.getElementById('detailSiswaTidakHadir').innerHTML = data.details.siswaKeterangan || "Tidak ada siswa absen.";
          }
        })
        .withFailureHandler(function(err) {
          console.error("Gagal memuat data dari spreadsheet: ", err);
        })
        .getDataKombinasiKepsek(TOKEN); // Fungsi pembaca statistik di GS Anda
    }

    // Jalankan penarikan data presensi saat dokumen selesai dimuat
    window.onload = ambilDataKepsek;
  </script>
</body>
</html>
