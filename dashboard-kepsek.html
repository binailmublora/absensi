<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kepala Sekolah - E-Absensi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f5132;
      --accent: #e5a93b;
      --bg: #f4f7f5;
      --text-main: #1e293b;
      --white: #ffffff;
      --danger: #dc3545;
      --success: #198754;
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text-main); 
      padding: 20px; 
    }
    
    .container { max-width: 900px; margin: 0 auto; }
    
    .header { 
      background: var(--primary); 
      color: white; 
      padding: 24px; 
      border-radius: 16px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px; 
      border-bottom: 4px solid var(--accent); 
    }
    
    .grid-stats { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 16px; 
      margin-bottom: 24px; 
    }
    
    .card-stat { 
      background: var(--white); 
      padding: 24px; 
      border-radius: 12px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.02); 
      border-left: 4px solid var(--primary); 
    }
    
    .card-stat.alert-card { border-left-color: var(--danger); }
    .card-stat.success-card { border-left-color: var(--success); }
    
    .card-stat h3 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-stat p { font-size: 32px; font-weight: 700; color: var(--primary); margin-top: 8px; }
    .card-stat .detail-text { font-size: 12px; color: #64748b; margin-top: 4px; }
    
    .action-panel {
      background: var(--white);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      text-align: center;
    }
    
    .btn-nav { 
      background: var(--primary); 
      color: white; 
      text-decoration: none; 
      padding: 12px 24px; 
      border-radius: 8px; 
      font-size: 15px; 
      font-weight: 600; 
      display: inline-block; 
      transition: background 0.2s;
      cursor: pointer;
    }
    
    .btn-nav:hover { background: #0b3d26; }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Header Terisi Otomatis Menggunakan localStorage -->
    <div class="header">
      <div>
        <h1>Dashboard Kepala Sekolah</h1>
        <p>Ahlan wa sahlan <strong id="namaUser">...</strong></p> 
      </div>
      <button onclick="logout()" style="background: var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; font-weight:600; cursor:pointer;">Keluar</button>
    </div>

    <!-- 4 Blok Rangkuman Utama Presensi Hari Ini -->
    <div class="grid-stats">
      <!-- 1. Ringkasan Guru Hadir -->
      <div class="card-stat success-card">
        <h3>Guru Hadir</h3>
        <p id="guruHadir">🔄</p>
        <div class="detail-text">Sudah melakukan absensi masuk</div>
      </div>
      
      <!-- 2. Ringkasan Guru Tidak Hadir -->
      <div class="card-stat alert-card">
        <h3>Guru Absen/Alfa</h3>
        <p id="guruAbsen" style="color: var(--danger);">🔄</p>
        <div class="detail-text" id="detailGuruTidakHadir">Memuat data keterangan...</div>
      </div>
      
      <!-- 3. Ringkasan Siswa Hadir -->
      <div class="card-stat success-card">
        <h3>Siswa Hadir</h3>
        <p id="siswaHadir">🔄</p>
        <div class="detail-text">Total dari seluruh kelas</div>
      </div>
      
      <!-- 4. Ringkasan Siswa Tidak Hadir -->
      <div class="card-stat alert-card">
        <h3>Siswa Absen/Alfa</h3>
        <p id="siswaAbsen" style="color: var(--danger);">🔄</p>
        <div class="detail-text" id="detailSiswaTidakHadir">Memuat data keterangan...</div>
      </div>
    </div>

    <!-- Panel Menu Rekapan Menuju Halaman GitHub Pages Anda (Tab yang Sama) -->
    <div class="action-panel">
      <a href="https://binailmublora.github.io/absensi/dashboard-export.html" target="_top" class="btn-nav">📊 Buka Menu Rekapan & Export</a>
    </div>

  </div>

  <script>
    // URL Backend disamakan persis dengan yang ada di dashboard-export.html Anda
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyKgvzxlQD8ZEnom5M7VNvQW36TZh38IWi1V5o9f7XY1ZzeZbBUGO9odYtg1tc4GBPg/exec";
    
    // Proteksi Validasi Login berbasis LocalStorage
    if (!localStorage.getItem('auth_token') || localStorage.getItem('user_role') !== 'KepalaSekolah') {
      window.location.href = 'index.html';
    }
    
    // Set Nama Pengguna Secara Instan dari LocalStorage browser
    document.getElementById('namaUser').textContent = localStorage.getItem('user_nama');

    function ambilDataKepsek() {
      // Menggunakan fetch POST dengan mode cors ke Google Apps Script backend Anda
      fetch(BACKEND_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ 
          action: 'getDataKepsek',
          token: localStorage.getItem('auth_token') 
        })
      })
      .then(res => {
        if (!res.ok) throw new Error("Respons server bermasalah");
        return res.json();
      })
      .then(data => {
        if(data && data.stats) {
          // Masukkan angka statistik ke dalam komponen card
          document.getElementById('guruHadir').textContent = data.stats.guruHadir || "0";
          document.getElementById('guruAbsen').textContent = data.stats.guruAbsen || "0";
          document.getElementById('siswaHadir').textContent = data.stats.siswaHadir || "0";
          document.getElementById('siswaAbsen').textContent = data.stats.siswaAbsen || "0";
          
          // Masukkan ringkasan teks keterangan (alasan) jika disediakan oleh backend Anda
          document.getElementById('detailGuruTidakHadir').innerHTML = data.details?.guruKeterangan || "Semua staf terabsen.";
          document.getElementById('detailSiswaTidakHadir').innerHTML = data.details?.siswaKeterangan || "Tidak ada siswa absen.";
        }
      })
      .catch(err => {
        console.error(err);
        // Tampilkan indikator error pada kartu jika koneksi gagal
        document.getElementById('guruHadir').textContent = "⚠️";
        document.getElementById('guruAbsen').textContent = "⚠️";
        document.getElementById('siswaHadir').textContent = "⚠️";
        document.getElementById('siswaAbsen').textContent = "⚠️";
        document.getElementById('detailGuruTidakHadir').textContent = "Gagal memuat data dari spreadsheet.";
        document.getElementById('detailSiswaTidakHadir').textContent = "Gagal memuat data dari spreadsheet.";
      });
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // Eksekusi fungsi penarikan data ketika window selesai dimuat
    window.onload = ambilDataKepsek;
  </script>
</body>
</html>
