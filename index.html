<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Absensi Sekolah</title>
  <!-- Menggunakan pustaka html5-qrcode standard -->
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --border: #e2e8f0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 480px; }
    h1 { font-size: 20px; text-align: center; margin-bottom: 20px; color: #0f172a; }
    .card { background: var(--card); border-radius: 16px; padding: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); margin-bottom: 16px; border: 1px solid var(--border); overflow: hidden; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; }
    #status { padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; font-weight: 500; margin-top: 12px; display: none; }
    .msg-process { background: #e0f2fe; color: #0369a1; }
    .msg-success { background: #dcfce7; color: #15803d; }
    .msg-error { background: #fee2e2; color: #b91c1c; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: #64748b; font-weight: 600; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; color: #fff; background: var(--success); }
  </style>
</head>
<body>

<div class="container">
  <h1>📷 Scan Absensi</h1>
  
  <div class="card">
    <div id="reader"></div>
    <div id="status"></div>
  </div>

  <div class="card">
    <h3 style="margin: 0 0 8px 0; font-size: 15px;">Riwayat Scan Sesi Ini</h3>
    <table>
      <thead>
        <tr><th>Jam</th><th>Nama</th><th>Tipe</th><th>Status</th></tr>
      </thead>
      <tbody id="historyBody">
        <tr id="emptyRow"><td colspan="4" style="text-align:center; color:#94a3b8;">Belum ada data scan</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  // ⚠️ GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA SETELAH DEPLOY ULANG
  const API_URL = "https://script.google.com/macros/s/XXXXX_ID_DEPLOYMENT_ANDA_XXXXX/exec"; 
  
  let html5QrcodeScanner;
  let isScanning = true;

  function onScanSuccess(decodedText) {
    if (!isScanning) return;
    isScanning = false; // Kunci scanner agar tidak memproses dobel data

    showStatus("Memproses QR Code...", "msg-process");

    // Kirim data ke Google Apps Script via POST (CORS handle)
    fetch(API_URL, {
      method: "POST",
      mode: "no-cors", // Memotong problem pembatasan CORS browser luar
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ barcodeId: decodedText })
    })
    .then(() => {
      // Karena menggunakan 'no-cors', kita tidak bisa membaca isi JSON respons secara langsung,
      // tapi data dipastikan masuk ke Google Sheet.
      showStatus("✅ Berhasil dikirim ke sistem!", "msg-success");
      updateHistoryTable(decodedText);
      
      // Buka kunci scanner kembali setelah jeda 3 detik
      setTimeout(() => { 
        isScanning = true; 
        showStatus("", ""); 
      }, 3000);
    })
    .catch(err => {
      showStatus("❌ Gagal mengirim data: " + err.message, "msg-error");
      setTimeout(() => { isScanning = true; }, 3000);
    });
  }

  function showStatus(text, className) {
    const el = document.getElementById("status");
    if(!text) { el.style.display = "none"; return; }
    el.className = "";
    el.classList.add(className);
    el.innerText = text;
    el.style.display = "block";
  }

  function updateHistoryTable(code) {
    const emptyRow = document.getElementById("emptyRow");
    if(emptyRow) emptyRow.remove();

    const now = new Date();
    const jam = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    
    const tbody = document.getElementById("historyBody");
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${jam}</td><td>${code}</td><td>Umum</td><td><span class="badge">Terkirim</span></td>`;
    tbody.prepend(tr);
  }

  // Inisialisasi Kamera Balik Mandiri
  html5QrcodeScanner = new Html5Qrcode("reader");
  html5QrcodeScanner.start(
    { facingMode: "environment" }, // Prioritaskan kamera belakang HP
    { fps: 10, qrbox: { width: 250, height: 250 } },
    onScanSuccess
  ).catch(err => {
    document.getElementById("reader").innerHTML = `<p style="color:var(--danger); text-align:center;">Gagal mengakses kamera. Pastikan memberikan izin lokasi/kamera HTTPS.</p>`;
  });
</script>
</body>
</html>
