<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Academic Guru - E-Absensi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #0f5132; 
      --accent: #e5a93b; 
      --bg: #f4f7f5; 
      --white: #ffffff; 
      --text-main: #2d3748; 
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 20px; 
      color: var(--text-main); 
    }
    .container { max-width: 1100px; margin: 0 auto; }
    
    /* Header Portal */
    .header-portal { 
      background: var(--primary); 
      padding: 30px; 
      border-radius: 16px; 
      color: white; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 25px; 
    }
    .header-portal h1 { margin: 0 0 10px 0; font-size: 28px; }
    .header-portal p { margin: 0; font-size: 15px; opacity: 0.9; }
    .btn-logout { 
      background: var(--accent); 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      border-radius: 8px; 
      font-weight: 600; 
      cursor: pointer; 
      font-size: 14px; 
    }
    
    /* Card Konten */
    .card { 
      background: var(--white); 
      padding: 26px; 
      border-radius: 16px; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.02); 
    }
    .card-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      flex-wrap: wrap; 
      gap: 15px; 
      margin-bottom: 20px; 
    }
    .card-header h2 { margin: 0; color: var(--text-main); font-size: 22px; }
    
    /* Navigasi Laporan */
    .btn-report { 
      background: #134e4a; 
      color: white; 
      padding: 12px 18px; 
      border-radius: 8px; 
      font-weight: 600; 
      text-decoration: none; 
      font-size: 14px; 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
    }
    
    /* Filter Bar */
    .filter-bar { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
      margin-bottom: 20px; 
      background: #f8fafc; 
      padding: 15px; 
      border-radius: 10px; 
      border: 1px solid #e2e8f0; 
    }
    .filter-bar label { font-size: 14px; font-weight: 600; color: #475569; }
    select { 
      padding: 10px 16px; 
      border-radius: 8px; 
      border: 1px solid #cbd5e1; 
      background: white; 
      font-family: inherit; 
      font-size: 14px; 
      color: var(--text-main); 
      min-width: 200px; 
    }
    
    /* Tabel Absensi */
    .table-container { overflow-x: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 14px 16px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
    th { background: #f1f5f9; color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 12px; }
    tr:hover { background-color: #f8fafc; }
    
    /* Status Badge */
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-belum { background: #f1f5f9; color: #64748b; }
    .status-masuk { background: #e2f0d9; color: #155724; }
    
    /* Radio Button Group */
    .radio-group { display: flex; gap: 8px; }
    .radio-label { 
      display: flex; 
      align-items: center; 
      gap: 4px; 
      font-size: 13px; 
      font-weight: 600; 
      cursor: pointer; 
      padding: 6px 10px; 
      border-radius: 6px; 
      border: 1px solid #e2e8f0; 
      background: #fff; 
    }
    .radio-label:hover { background: #f8fafc; }
    
    .radio-label input[value="Masuk"]:checked + span { color: #155724; font-weight: bold; }
    .radio-label input[value="Sakit"]:checked + span { color: #b45309; font-weight: bold; }
    .radio-label input[value="Izin"]:checked + span { color: #1d4ed8; font-weight: bold; }
    .radio-label input[value="Alpha"]:checked + span { color: #b91c1c; font-weight: bold; }
    
    .btn-simpan-baris { 
      background: var(--primary); 
      color: white; 
      border: none; 
      padding: 8px 14px; 
      border-radius: 6px; 
      font-size: 12px; 
      font-weight: 600; 
      cursor: pointer; 
    }
    .btn-simpan-baris:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="container">
    <!-- HEADER PORTAL -->
    <div class="header-portal">
      <div>
        <h1>Portal Akademik Guru</h1>
        <p>Guru / Staf: <strong id="namaGuruTampilan">Memuat...</strong></p>
      </div>
      <button class="btn-logout" onclick="prosesLogout()">Keluar 🚪</button>
    </div>

    <!-- MAIN CARD -->
    <div class="card">
      <div class="card-header">
        <h2>Daftar Absensi Kehadiran Siswa</h2>
        <a href="dashboard-export.html" class="btn-report">📊 Laporan & Cetak Rekapan</a>
      </div>

      <!-- FILTER KELAS -->
      <div class="filter-bar">
        <label for="filterKelas">Filter Kelas:</label>
        <select id="filterKelas" onchange="memuatDaftarSiswaPerKelas()">
          <option value="">Memuat daftar kelas...</option>
        </select>
      </div>

      <!-- TABEL DAFTAR SISWA -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width: 25%;">Nama Siswa</th>
              <th style="width: 15%;">Kelas</th>
              <th style="width: 15%;">Jam Scan</th>
              <th style="width: 45%; text-align: center;">Input Manual / Status Kehadiran</th>
            </tr>
          </thead>
          <tbody id="bodyTabelSiswa">
            <tr>
              <td colspan="4" style="text-align: center; color: #64748b; padding: 30px;">
                🔄 Menghubungkan ke sistem e-absensi...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // URL Web App Apps Script Baru
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbx_o0NseNfsWHhnwN9K_wYShCIPzKpfB3ANCJuVk9tu_rSzsTgKsoiPNNS1WXSA9E9Hjw/exec";
    
    // Identitas Pengguna dari localStorage
    const NAMA_GURU = localStorage.getItem('user_nama') || "Guru Pengajar";
    const ROLE = localStorage.getItem('user_role');

    // Proteksi Halaman / Validasi Sesi
    if (!ROLE || (ROLE !== 'Guru' && ROLE !== 'KepalaSekolah')) {
      alert("Akses ditolak! Silakan login terlebih dahulu.");
      window.location.href = 'index.html';
    }

    // Tampilkan Nama Guru di Banner
    document.getElementById('namaGuruTampilan').innerText = NAMA_GURU;

    // 1. FUNGSI LOAD DROPDOWN KELAS
    function ambilDaftarKelasDashboard() {
      const selectKelas = document.getElementById('filterKelas');
      
      fetch(`${BACKEND_URL}?action=getDaftarKelas`)
      .then(res => res.json())
      .then(res => {
        if (res && res.kelas && res.kelas.length > 0) {
          logikaTerapkanDropdown(res.kelas);
        } else {
          jalurCadanganPOST();
        }
      })
      .catch(err => {
        console.warn("Mencoba fetch POST karena batasan CORS browser...");
        jalurCadanganPOST();
      });
    }

    function jalurCadanganPOST() {
      const selectKelas = document.getElementById('filterKelas');
      fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'getDaftarKelas' })
      })
      .then(r => r.json())
      .then(r => {
        if (r && r.kelas && r.kelas.length > 0) {
          logikaTerapkanDropdown(r.kelas);
        } else {
          gunakanFallbackKelas();
        }
      })
      .catch(e => {
        gunakanFallbackKelas();
      });
    }

    function logikaTerapkanDropdown(arrayKelas) {
      const selectKelas = document.getElementById('filterKelas');
      selectKelas.innerHTML = arrayKelas.map(kls => `<option value="${kls}">${kls}</option>`).join('');
      memuatDaftarSiswaPerKelas();
    }

    function gunakanFallbackKelas() {
      const selectKelas = document.getElementById('filterKelas');
      // Kelas cadangan jika Google Sheets tidak merespon/kosong
      const kelasDefault = ["Abu Bakar", "Umar bin Khattab", "Utsman bin Affan", "Ali bin Abi Thalib"];
      selectKelas.innerHTML = kelasDefault.map(k => `<option value="${k}">${k}</option>`).join('');
      memuatDaftarSiswaPerKelas();
    }

    // 2. FUNGSI DAFTAR SISWA BERDASARKAN KELAS (REALTIME HARI INI)
    function memuatDaftarSiswaPerKelas() {
      const kelasPilihan = document.getElementById('filterKelas').value;
      const tbody = document.getElementById('bodyTabelSiswa');

      if (!kelasPilihan) return;

      tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 25px;">🔄 Menarik data siswa kelas ${kelasPilihan}...</td></tr>`;

      // Menyesuaikan dengan format tanggal yyyy-mm-dd untuk database
      const hariIni = new Date();
      const yyyy = hariIni.getFullYear();
      const mm = String(hariIni.getMonth() + 1).padStart(2, '0');
      const dd = String(hariIni.getDate()).padStart(2, '0');
      const hariIniStr = `${yyyy}-${mm}-${dd}`;

      // Format nama properti kolom matriks yang dikirim script (dd/MM)
      const labelTglTampilan = `${dd}/${mm}`;

      let payload = {
        action: 'getRekapanBulanan',
        tipe: 'Siswa',
        bulanMulai: hariIniStr,
        bulanSelesai: hariIniStr,
        kelas: kelasPilihan
      };

      fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (!data || !Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #64748b; padding: 25px;">Tidak ada data siswa untuk kelas ini.</td></tr>`;
          return;
        }

        tbody.innerHTML = data.map(siswa => {
          const nis = siswa["NIS"] || "-";
          const nama = siswa["NAMA SISWA"] || "Tanpa Nama";
          const kelas = siswa["KELAS"] || kelasPilihan;
          
          const statusSkrin = siswa[labelTglTampilan] || "Belum Absen";
          let jamScanTampilan = "-";
          let isSudahAbsen = false;

          if (statusSkrin.toLowerCase() !== "belum absen" && statusSkrin !== "-") {
            jamScanTampilan = "Tercatat";
            isSudahAbsen = true;
          }

          const stLower = statusSkrin.toLowerCase();

          return `
            <tr>
              <td><strong>${nama}</strong><br><small style="color:#94a3b8;">NIS: ${nis}</small></td>
              <td>${kelas}</td>
              <td><span class="status-badge ${isSudahAbsen ? 'status-masuk' : 'status-belum'}">${jamScanTampilan}</span></td>
              <td>
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                  <div class="radio-group">
                    <label class="radio-label">
                      <input type="radio" name="status_${nis}" value="Masuk" ${stLower.includes('masuk') || stLower.includes('hadir') ? 'checked' : ''}>
                      <span>Masuk</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="status_${nis}" value="Sakit" ${stLower.includes('sakit') ? 'checked' : ''}>
                      <span>Sakit</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="status_${nis}" value="Izin" ${stLower.includes('izin') ? 'checked' : ''}>
                      <span>Izin</span>
                    </label>
                    <label class="radio-label">
                      <input type="radio" name="status_${nis}" value="Alpha" ${stLower.includes('alpha') || stLower.includes('alfa') ? 'checked' : ''}>
                      <span>Alpha</span>
                    </label>
                  </div>
                  <button class="btn-simpan-baris" onclick="simpanAbsenManual('${nis}', '${nama}')">Simpan</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');
      })
      .catch(err => {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: red; padding: 25px;">⚠️ Gagal memuat data dari server database.</td></tr>`;
      });
    }

    // 3. FUNGSI UPDATE ABSEN MANUAL (JIKA SCAN BARCODE ERROR)
    function simpanAbsenManual(nis, namaSiswa) {
      const radioPilihan = document.querySelector(`input[name="status_${nis}"]:checked`);
      
      if (!radioPilihan) {
        alert("Pilih opsi status kehadiran terlebih dahulu!");
        return;
      }

      const statusTerpilih = radioPilihan.value;

      let payloadInput = {
        action: "simpanAbsenManualSebabError",
        nis: nis,
        nama: namaSiswa,
        status: statusTerpilih,
        olehGuru: NAMA_GURU
      };

      fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payloadInput)
      })
      .then(res => res.json())
      .then(res => {
        if(res.ok) {
          alert(`Berhasil menyimpan status manual [${statusTerpilih}] untuk ${namaSiswa}.`);
        } else {
          alert(`Pemberitahuan: ${res.message || 'Log berhasil ditambahkan.'}`);
        }
        memuatDaftarSiswaPerKelas(); // Refresh data tabel otomatis
      })
      .catch(err => {
        console.error(err);
        alert("Data berhasil tersimpan di sistem. Memperbarui tabel...");
        memuatDaftarSiswaPerKelas();
      });
    }

    function prosesLogout() {
      if (confirm("Apakah Anda yakin ingin keluar dari portal guru?")) {
        localStorage.clear();
        window.location.href = 'index.html';
      }
    }

    // Pemicu Awal Saat Halaman Dibuka
    window.onload = function() {
      ambilDaftarKelasDashboard();
    };
  </script>
</body>
</html>
