<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Guru - E-Absensi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f5132;
      --accent: #e5a93b;
      --bg: #f4f7f5;
      --text-main: #1e293b;
      --white: #ffffff;
      --danger: #dc3545;
      --success: #198754;
      --warning: #ffc107;
    }
    
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: var(--bg); 
      color: var(--text-main); 
      padding: 20px; 
    }
    
    .container { max-width: 950px; margin: 0 auto; }
    
    .header { 
      background: var(--primary); 
      color: white; 
      padding: 24px; 
      border-radius: 16px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 20px; 
      border-bottom: 4px solid var(--accent); 
    }
    
    .card {
      background: var(--white);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      margin-bottom: 20px;
    }

    .filter-panel {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 20px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label { font-size: 12px; font-weight: 600; color: #64748b; }
    select, input[type="date"], button { padding: 10px 14px; border-radius: 8px; font-size: 14px; border: 1px solid #dcdfdc; font-family: inherit; }
    
    button { 
      background: var(--primary); 
      color: white; 
      border: none; 
      font-weight: 600; 
      cursor: pointer; 
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button.btn-save { background: var(--success); }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; border-bottom: 1px solid #edf2f0; font-size: 14px; text-align: left; }
    th { background: #f8faf9; color: var(--primary); font-weight: 600; }
    
    .select-status {
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: 700;
      width: 110px;
      font-family: inherit;
    }
    .status-H { background-color: #e2f0d9; color: #155724; border-color: #c3e6cb; }
    .status-S { background-color: #fff3cd; color: #856404; border-color: #ffeeba; }
    .status-I { background-color: #cff4fc; color: #055160; border-color: #b6effb; }
    .status-A { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }

    .action-panel { text-align: center; padding: 16px; background: var(--white); border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .btn-nav { background: var(--primary); color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Topbar Header -->
    <div class="header">
      <div>
        <h1>Dashboard Guru</h1>
        <p>Ahlan wa sahlan, <strong id="namaUser">...</strong></p> 
      </div>
      <button onclick="logout()" style="background: var(--accent); color:white; border:none; padding:8px 16px; border-radius:8px; font-weight:600; cursor:pointer;">Keluar</button>
    </div>

    <!-- Blok Manajemen Absensi Siswa -->
    <div class="card">
      <h2>📝 Pencatatan & Perubahan Absensi Siswa</h2>
      <p style="font-size: 13px; color: #64748b; margin-bottom: 15px;">Pilih tanggal dan kelas yang dituju untuk mengelola data absensi siswa.</p>
      
      <div class="filter-panel">
        <div class="filter-group">
          <label>Pilih Tanggal:</label>
          <input type="date" id="tglAbsensi">
        </div>
        <div class="filter-group">
          <label>Pilih Kelas:</label>
          <select id="kelasSiswa">
            <option value="">Memuat daftar kelas...</option>
          </select>
        </div>
        <button onclick="tampilkanSiswaDariSheetMaster()">🔍 Tampilkan Siswa</button>
        <button class="btn-save" id="btnSimpan" onclick="simpanKeAbsensiSiswa()" style="display:none;">💾 Simpan Rekapan</button>
      </div>

      <!-- Tabel Input & Edit Absensi -->
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th style="width: 8%;">No</th>
              <th style="width: 25%;">ID Siswa (NISN)</th>
              <th style="width: 42%;">Nama Lengkap</th>
              <th style="width: 25%;">Status Kehadiran</th>
            </tr>
          </thead>
          <tbody id="tabelSiswaBody">
            <tr><td colspan="4" style="text-align:center; color: #64748b; padding: 20px;">Silakan tentukan tanggal dan kelas terlebih dahulu.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Panel Menu Rekapan -->
    <div class="action-panel">
      <a href="https://binailmublora.github.io/absensi/dashboard-export.html" target="_top" class="btn-nav">📊 Buka Menu Rekapan & Export</a>
    </div>

  </div>

  <script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxY9qzNdXcLt-7arlJNuoKF_48zqS6UNPRXlNs_mefkEiIJN5YyZa7VUiTO9EL6MSvRSQ/exec";
    const ROLE = localStorage.getItem('user_role');

    if (!localStorage.getItem('auth_token') || (ROLE !== 'Guru' && ROLE !== 'KepalaSekolah')) {
      window.location.href = 'index.html';
    }

    document.getElementById('namaUser').textContent = localStorage.getItem('user_nama');

    function setHariIni() {
      const hariIni = new Date();
      const formatHariIni = `${hariIni.getFullYear()}-${String(hariIni.getMonth() + 1).padStart(2, '0')}-${String(hariIni.getDate()).padStart(2, '0')}`;
      document.getElementById('tglAbsensi').value = formatHariIni;
    }

    function memuatDaftarKelasOtomatis() {
      fetch(BACKEND_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'getDaftarKelas' })
      })
      .then(res => res.json())
      .then(res => {
        const selectKelas = document.getElementById('kelasSiswa');
        if (res && res.ok && res.kelas && res.kelas.length > 0) {
          selectKelas.innerHTML = res.kelas.map(kls => `<option value="${kls}">${kls}</option>`).join('');
        } else {
          selectKelas.innerHTML = `<option value="">Tidak ada kelas tersedia</option>`;
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('kelasSiswa').innerHTML = `<option value="">Gagal sinkronisasi data kelas</option>`;
      });
    }

    function tampilkanSiswaDariSheetMaster() {
      const tgl = document.getElementById('tglAbsensi').value;
      const kelas = document.getElementById('kelasSiswa').value;
      const tbody = document.getElementById('tabelSiswaBody');

      if(!tgl || !kelas) {
        alert("Mohon tentukan pilihan tanggal dan kelas!");
        return;
      }

      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:20px;">🔄 Menghubungkan ke server spreadsheet...</td></tr>';
      document.getElementById('btnSimpan').style.display = 'none';

      fetch(BACKEND_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'getAbsensiSiswaPerHari', // Menggunakan fungsi fallback utama
          tanggal: tgl,
          kelas: kelas,
          token: localStorage.getItem('auth_token')
        })
      })
      .then(res => res.json())
      .then(data => {
        // Toleransi pengecekan jika properti data dibungkus array langsung atau melalui variabel sub-objek
        const daftarSiswa = data.siswa || data.data || (Array.isArray(data) ? data : null);

        if(!daftarSiswa || daftarSiswa.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#64748b; padding:20px;">⚠️ Tidak menemukan kecocokan data siswa pada filter ini.</td></tr>';
          return;
        }

        document.getElementById('btnSimpan').style.display = 'inline-block';
        
        tbody.innerHTML = daftarSiswa.map((mhs, index) => {
          // Fallback pembacaan ID: mengecek ID_Siswa, id_siswa, nisn, atau id
          const idValid = mhs.ID_Siswa || mhs.id_siswa || mhs.nisn || mhs.id || "-";
          const namaValid = mhs.Nama || mhs.nama || "-";
          
          let st = mhs.Status || mhs.status || "H";
          st = st.toUpperCase();
          if(st === "HADIR" || st === "MASUK") st = "H";
          if(st === "SAKIT") st = "S";
          if(st === "IZIN" || st === "IJIN") st = "I";
          if(st === "ALPHA" || st === "ALFA") st = "A";
          if(st !== "H" && st !== "S" && st !== "I" && st !== "A") st = "H"; // Default jika data aneh

          return `
            <tr data-idsiswa="${idValid}">
              <td>${index + 1}</td>
              <td><strong>${idValid}</strong></td>
              <td>${namaValid}</td>
              <td>
                <select class="select-status status-${st}" onchange="updateWarnaDropdown(this)">
                  <option value="H" ${st === 'H' ? 'selected' : ''}>H (Hadir)</option>
                  <option value="S" ${st === 'S' ? 'selected' : ''}>S (Sakit)</option>
                  <option value="I" ${st === 'I' ? 'selected' : ''}>I (Izin)</option>
                  <option value="A" ${st === 'A' ? 'selected' : ''}>A (Alpha)</option>
                </select>
              </td>
            </tr>
          `;
        }).join('');
      })
      .catch(err => {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding:20px;">❌ Terjadi kesalahan pemrosesan JSON dari Web App Apps Script.</td></tr>';
      });
    }

    function updateWarnaDropdown(el) {
      el.className = `select-status status-${el.value}`;
    }

    function simpanKeAbsensiSiswa() {
      const tgl = document.getElementById('tglAbsensi').value;
      const kelas = document.getElementById('kelasSiswa').value;
      const barisTabel = document.querySelectorAll('#tabelSiswaBody tr');
      
      let dataPresensi = [];
      barisTabel.forEach(tr => {
        const idSiswa = tr.getAttribute('data-idsiswa');
        const status = tr.querySelector('.select-status')?.value;
        if(idSiswa && idSiswa !== "-") {
          dataPresensi.push({ id_siswa: idSiswa, status: status });
        }
      });

      if(dataPresensi.length === 0) return;

      const btn = document.getElementById('btnSimpan');
      btn.disabled = true;
      btn.textContent = "⌛ Menyimpan...";

      fetch(BACKEND_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'simpanAbsensiSiswa', 
          tanggal: tgl,
          kelas: kelas,
          data: dataPresensi,
          token: localStorage.getItem('auth_token')
        })
      })
      .then(res => res.json())
      .then(res => {
        btn.disabled = false;
        btn.textContent = "💾 Simpan Rekapan";
        if(res.ok || res.status === "success") {
          alert("✓ Rekapan manual berhasil disimpan ke sheet Absensi_Siswa!");
          tampilkanSiswaDariSheetMaster();
        } else {
          alert("Gagal menyimpan rekapan: " + (res.message || "Periksa log sistem"));
        }
      })
      .catch(err => {
        console.error(err);
        btn.disabled = false;
        btn.textContent = "💾 Simpan Rekapan";
        alert("❌ Putus koneksi server / Apps script mengalami crash eksekusi.");
      });
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    window.onload = function() {
      setHariIni();
      memuatDaftarKelasOtomatis();
    };
  </script>
</body>
</html>
